<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steelworks Center of the West | Kiosk Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="kiosk-app">
    <div class="screen" id="screen">
      <header class="topbar">
        <div class="topbar-inner">
          <div class="brand">
            <small id="site-preview-label"></small>
            <strong id="site-title"></strong>
          </div>
          <div class="top-actions">
            <button class="btn" onclick="goHome()">Home</button>
            <button class="btn" onclick="goBack()">Back</button>
            <button class="btn btn-primary" onclick="showPage('page-exhibit')">Explore Exhibit</button>
          </div>
        </div>
      </header>

      <section class="page active" id="page-home">
        <div class="container">
          <div class="hero">
            <div class="hero-panel" id="home-hero-panel">
              <div class="eyebrow" id="home-hero-eyebrow"></div>
              <img id="home-hero-logo" src="" alt="" width="200">
              <p class="muted" id="home-hero-intro"></p>
              <div class="hero-actions">
                <button class="btn btn-primary" onclick="showPage('page-exhibit')">Explore the Exhibit</button>
                <button class="btn" onclick="showPage('page-photos')">Historic Photos</button>
                <button class="btn" onclick="showPage('page-exhibit-gallery')">Exhibit Gallery</button>
              </div>
            </div>

            <div class="info-panel">
              <div>
                <div class="eyebrow" id="home-welcome-eyebrow"></div>
                <h2 id="home-welcome-title"></h2>
                <p class="muted" id="home-welcome-text"></p>
              </div>
              <div class="quick-links" id="home-quick-links"></div>
            </div>
          </div>

          <div class="content-panel section-spacer">
            <div class="eyebrow" id="home-structure-eyebrow"></div>
            <h2 id="home-structure-title"></h2>
            <div class="grid-4" id="home-feature-cards"></div>
          </div>
        </div>
      </section>

      <section class="page" id="page-exhibit">
        <div class="container">
          <div class="content-panel exhibit">
            <div class="exhibit-header-row">
  <div class="exhibit-branding">
    <div class="eyebrow" id="exhibit-eyebrow"></div>
    <img id="exhibit-logo" src="" alt="" width="200" style="margin-bottom:16px;">
  </div>

  <div class="exhibit-sponsor" id="exhibit-sponsor-block">
    <div class="eyebrow" id="primary-sponsor-eyebrow"></div>
    <img id="primary-sponsor-logo" src="" alt="" width="180">
  </div>
</div>

<h2 id="exhibit-title"></h2>
<p id="exhibit-intro"></p>
        
<div class="sponsor-names-block" id="additional-sponsors-block" hidden>
  <div class="eyebrow">Additional Sponsors</div>
  <div class="sponsor-name-list" id="additional-sponsors-list"></div>
</div>
          
            <div class="grid-3" id="exhibit-cards"></div>
          </div>
        </div>
      </section>

      <section class="page" id="page-exhibit-gallery">
        <div class="container">
          <div class="content-panel">
            <div class="eyebrow" id="exhibit-gallery-eyebrow"></div>
            <h2 id="exhibit-gallery-title"></h2>
            <p id="exhibit-gallery-intro"></p>
            <div class="sponsor-names-block" id="gallery-sponsors-block" hidden>
  <div class="eyebrow">Additional Sponsors</div>
  <div class="sponsor-name-list" id="gallery-sponsors-list"></div>
</div>
            <div class="gallery-grid" id="exhibit-gallery-items"></div>
          </div>
        </div>
      </section>

      <section class="page" id="page-exhibit-media">
        <div class="container">
          <div class="media-panel">
            <div class="eyebrow" id="exhibit-media-eyebrow"></div>
            <h2 id="exhibit-media-title"></h2>
            <p id="exhibit-media-intro"></p>

            <div class="sponsor-names-block" id="media-sponsors-block" hidden>
  <div class="eyebrow">Additional Sponsors</div>
  <div class="sponsor-name-list" id="media-sponsors-list"></div>
</div>

            <div class="media-list" id="exhibit-media-items"></div>
          </div>
        </div>
      </section>

      <div id="panel-pages"></div>

      <section class="page" id="page-photos">
        <div class="container">
          <div class="content-panel">
            <div class="eyebrow" id="gallery-eyebrow"></div>
            <h2 id="gallery-title"></h2>
            <p id="gallery-intro"></p>
            <div class="gallery-grid" id="gallery-items"></div>
          </div>
        </div>
      </section>

      <section class="page" id="page-about">
        <div class="container">
          <div class="content-panel">
            <div class="eyebrow" id="about-eyebrow"></div>
            <h2 id="about-title"></h2>
            <div id="about-text"></div>
            <div class="about-logo" style="margin-top:24px;">
              <img id="about-logo" src="" alt="" width="220" style="max-width: 100%; height: auto;">
            </div>
          </div>
        </div>
      </section>
    </div>

    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <div class="bottom-group">
          <button class="btn" onclick="goHome()">Home</button>
          <button class="btn" onclick="goBack()">Back</button>
          <button class="btn" onclick="showPage('page-exhibit')">Exhibit</button>
        </div>
        <div class="bottom-group">
          <button class="btn" onclick="showPage('page-exhibit-gallery')">Exhibit Gallery</button>
          <button class="btn" onclick="showPage('page-exhibit-media')">Exhibit Media</button>
          <button class="btn" onclick="showPage('page-photos')">Historic Photos</button>
          <button class="btn" onclick="showPage('page-about')">About</button>
          <button class="btn btn-primary" onclick="resetKiosk()">Start Over</button>
        </div>
      </div>
    </nav>
  </div>

  <script>
    const historyStack = [];
    let currentPage = 'page-home';
    let exhibitPanels = [];

    function assetPath(path) {
      if (!path) return '';
      return path.startsWith('/') ? path.slice(1) : path;
    }

    function showPage(pageId) {
      if (pageId === currentPage) return;
      historyStack.push(currentPage);
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      const nextPage = document.getElementById(pageId);
      if (nextPage) {
        nextPage.classList.add('active');
        currentPage = pageId;
        document.getElementById('screen').scrollTop = 0;
      }
    }

    function goBack() {
      if (!historyStack.length) return;
      const previous = historyStack.pop();
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      const prevPage = document.getElementById(previous);
      if (prevPage) {
        prevPage.classList.add('active');
        currentPage = previous;
        document.getElementById('screen').scrollTop = 0;
      }
    }

    function goHome() {
      if (currentPage !== 'page-home') historyStack.push(currentPage);
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      document.getElementById('page-home').classList.add('active');
      currentPage = 'page-home';
      document.getElementById('screen').scrollTop = 0;
    }

    function resetKiosk() {
      historyStack.length = 0;
      goHome();
    }

    function playMediaFromButton(button, selector) {
      const media = button.closest(selector)?.querySelector('audio, video');
      if (!media) return;
      media.hidden = false;
      media.play();
    }

    function renderPanelPages(panels) {
      exhibitPanels = panels || [];
      const wrapper = document.getElementById('panel-pages');
      wrapper.innerHTML = '';
      exhibitPanels.forEach((panel, index) => {
        const prevPage = index === 0 ? 'page-exhibit' : exhibitPanels[index - 1].id;
        const nextPage = index === exhibitPanels.length - 1 ? 'page-exhibit-gallery' : exhibitPanels[index + 1].id;
        wrapper.innerHTML += `
          <section class="page" id="${panel.id}">
            <div class="container">
              <div class="content-panel">
                <div class="story-hero" style="background-image:url('${assetPath(panel.heroImage || '')}');"></div>
                <div class="eyebrow">${panel.eyebrow || ''}</div>
                <h2>${panel.title || ''}</h2>
               <div class="meta-row">${(panel.tags || []).map(tag => `<span class="pill">${tag}</span>`).join('')}</div>

${(window.additionalSponsorNames && window.additionalSponsorNames.length) ? `
  <div class="sponsor-names-block">
    <div class="eyebrow">Additional Sponsors</div>
    <div class="sponsor-name-list">
      ${window.additionalSponsorNames.map(name => `<span class="sponsor-name">${name}</span>`).join('')}
    </div>
  </div>
` : ''}

<div class="panel-layout">
                
                <div class="panel-layout">
                  <div class="panel-copy">
                    ${(panel.paragraphs || []).map(paragraph => `<p>${paragraph}</p>`).join('')}
                  </div>
                  <div class="panel-audio ${panel.audioClip ? '' : 'is-empty'}">
                    <div class="eyebrow">Audio Panel</div>
                    <h3>Listen to this panel</h3>
                    <p class="muted">Hear this panel read aloud as part of the exhibit experience.</p>
                    <button class="btn btn-primary" type="button" onclick="playMediaFromButton(this, '.panel-audio')">Play Audio</button>
                    <audio controls preload="none" ${panel.audioClip ? '' : 'hidden'}>
                      <source src="${assetPath(panel.audioClip || '')}" type="audio/mpeg">
                    </audio>
                  </div>
                </div>
                <div class="story-nav">
                  <button class="btn" onclick="showPage('${prevPage}')">Previous</button>
                  <button class="btn" onclick="showPage('${nextPage}')">Next</button>
                </div>
              </div>
            </div>
          </section>`;
      });
    }

    function renderMediaItems(containerId, items) {
      const mediaList = document.getElementById(containerId);
      mediaList.innerHTML = '';
      (items || []).forEach(item => {
        const isVideo = item.type === 'video';
        mediaList.innerHTML += `
          <div class="media-item">
            <div class="media-thumb" style="background-image:url('${assetPath(item.thumbnail || item.thumb || '')}');"></div>
            <div class="media-content">
              <div class="eyebrow">${item.eyebrow || ''}</div>
              <h3>${item.title || ''}</h3>
              <p class="muted">${item.text || ''}</p>
              <button class="btn" type="button" onclick="playMediaFromButton(this, '.media-content')">${item.buttonLabel || 'Play'}</button>
              ${isVideo
                ? `<video controls preload="none" hidden><source src="${assetPath(item.file || '')}" type="video/mp4"></video>`
                : `<audio controls preload="none" hidden><source src="${assetPath(item.file || '')}" type="audio/mpeg"></audio>`}
            </div>
          </div>`;
      });
    }

    async function loadContent() {
      try {
        const [siteSettings, home, exhibit, about, historicPhotos] = await Promise.all([
          fetch('./content/site-settings.json').then(r => r.json()),
          fetch('./content/home.json').then(r => r.json()),
          fetch('./content/exhibit-long-journey.json').then(r => r.json()),
          fetch('./content/about.json').then(r => r.json()),
          fetch('./content/historic-photos.json').then(r => r.json())
        ]);

        document.getElementById('site-preview-label').textContent = siteSettings.previewLabel || '';
        document.getElementById('site-title').textContent = siteSettings.title || '';
        document.getElementById('screen').style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.8), rgba(18, 8, 1, 0.9)), url('${assetPath(siteSettings.backgroundPhoto || '')}')`;

        document.getElementById('home-hero-eyebrow').textContent = home.heroEyebrow || '';
        document.getElementById('home-hero-logo').src = assetPath(home.heroLogo || '');
        document.getElementById('home-hero-logo').alt = home.heroLogoAlt || 'Exhibit logo';
        document.getElementById('home-hero-intro').textContent = home.heroIntro || '';
        document.getElementById('home-welcome-eyebrow').textContent = home.welcomeEyebrow || '';
        document.getElementById('home-welcome-title').textContent = home.welcomeTitle || '';
        document.getElementById('home-welcome-text').textContent = home.welcomeText || '';
        document.getElementById('home-structure-eyebrow').textContent = home.structureEyebrow || '';
        document.getElementById('home-structure-title').textContent = home.structureTitle || '';

        const homeQuickLinks = document.getElementById('home-quick-links');
        homeQuickLinks.innerHTML = '';
        (home.quickLinks || []).forEach(link => {
          homeQuickLinks.innerHTML += `
            <div class="quick-link" onclick="showPage('${link.pageId || 'page-exhibit'}')">
              <strong>${link.title || ''}</strong>
              <p class="muted">${link.text || ''}</p>
            </div>`;
        });

        const homeFeatureCards = document.getElementById('home-feature-cards');
        homeFeatureCards.innerHTML = '';
        (exhibit.cards || []).forEach(card => {
          homeFeatureCards.innerHTML += `
            <div class="card" onclick="showPage('${card.pageId || 'page-exhibit'}')">
              <div class="card-image" style="background-image:url('${assetPath(card.image || '')}');"></div>
              <div class="card-body">
                <h3>${card.title || ''}</h3>
                <p class="muted">${card.text || ''}</p>
              </div>
            </div>`;
        });

        document.getElementById('exhibit-eyebrow').textContent = exhibit.eyebrow || '';
        document.getElementById('exhibit-logo').src = assetPath(exhibit.logo || '');
        document.getElementById('exhibit-logo').alt = exhibit.logoAlt || 'Exhibit logo';
        document.getElementById('exhibit-title').textContent = exhibit.title || '';
        document.getElementById('exhibit-intro').textContent = exhibit.intro || '';
        document.getElementById('exhibit-note').textContent = exhibit.note || '';
        
        const exhibitCards = document.getElementById('exhibit-cards');
        exhibitCards.innerHTML = '';
        (exhibit.cards || []).forEach(card => {
          exhibitCards.innerHTML += `
            <div class="card" onclick="showPage('${card.pageId || 'page-exhibit'}')">
              <div class="card-image" style="background-image:url('${assetPath(card.image || '')}');"></div>
              <div class="card-body">
                <h3>${card.title || ''}</h3>
                <p class="muted">${card.text || ''}</p>
              </div>
            </div>`;
        });

        document.getElementById('exhibit-gallery-eyebrow').textContent = exhibit.photoGallery?.eyebrow || '';
        document.getElementById('exhibit-gallery-title').textContent = exhibit.photoGallery?.title || '';
        document.getElementById('exhibit-gallery-intro').textContent = exhibit.photoGallery?.intro || '';
        const exhibitGallery = document.getElementById('exhibit-gallery-items');
        exhibitGallery.innerHTML = '';
        (exhibit.photoGallery?.items || []).forEach(item => {
          exhibitGallery.innerHTML += `
            <div class="gallery-item">
              <img src="${assetPath(item.image || '')}" alt="${item.alt || ''}">
              <div class="gallery-caption">
                <strong>${item.title || ''}</strong>
                <p class="muted">${item.description || ''}</p>
              </div>
            </div>`;
        });

        document.getElementById('exhibit-media-eyebrow').textContent = exhibit.mediaLibrary?.eyebrow || '';
        document.getElementById('exhibit-media-title').textContent = exhibit.mediaLibrary?.title || '';
        document.getElementById('exhibit-media-intro').textContent = exhibit.mediaLibrary?.intro || '';
        renderMediaItems('exhibit-media-items', exhibit.mediaLibrary?.items || []);

        renderPanelPages(exhibit.panels || []);

        document.getElementById('gallery-eyebrow').textContent = historicPhotos.eyebrow || '';
        document.getElementById('gallery-title').textContent = historicPhotos.title || '';
        document.getElementById('gallery-intro').textContent = historicPhotos.intro || '';
        const gallery = document.getElementById('gallery-items');
        gallery.innerHTML = '';
        (historicPhotos.items || []).forEach(item => {
          gallery.innerHTML += `
            <div class="gallery-item">
              <img src="${assetPath(item.image || '')}" alt="${item.alt || ''}">
              <div class="gallery-caption">
                <strong>${item.title || ''}</strong>
                <p class="muted">${item.description || ''}</p>
              </div>
            </div>`;
        });

        document.getElementById('about-eyebrow').textContent = about.eyebrow || '';
        document.getElementById('about-title').textContent = about.title || '';
        const aboutText = document.getElementById('about-text');
        aboutText.innerHTML = '';
        (about.paragraphs || []).forEach(paragraph => {
          aboutText.innerHTML += `<p>${paragraph}</p>`;
        });
        document.getElementById('about-logo').src = assetPath(about.logo || '');
        document.getElementById('about-logo').alt = about.logoAlt || 'Steelworks logo';
      } catch (error) {
        console.error(error);
        const fallback = document.createElement('div');
        fallback.style.padding = '1rem';
        fallback.style.color = '#fff';
        fallback.style.background = 'rgba(120,0,0,0.85)';
        fallback.style.position = 'fixed';
        fallback.style.top = '0';
        fallback.style.left = '0';
        fallback.style.right = '0';
        fallback.style.zIndex = '9999';
        fallback.textContent = 'Content failed to load. Check the JSON file paths and published branch.';
        document.body.prepend(fallback);
      }
    }

    loadContent();
  </script>

  <div class="lightbox" id="lightbox" hidden>
  <button class="lightbox-close" id="lightbox-close" aria-label="Close full image view">&times;</button>
  <div class="lightbox-content">
    <img id="lightbox-image" src="" alt="">
    <div class="lightbox-caption">
      <strong id="lightbox-title"></strong>
      <p id="lightbox-description"></p>
    </div>
  </div>
</div>

</body>
</html>
