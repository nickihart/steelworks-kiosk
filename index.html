<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Steelworks Kiosk</title>
<link rel="stylesheet" href="styles.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="app-shell">

<header class="topbar">
<div class="brand">
<small id="site-preview-label"></small>
<strong id="site-title"></strong>
</div>

<nav class="main-nav">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('exhibit')">Exhibit</button>
<button onclick="showPage('gallery')">Photos</button>
<button onclick="showPage('media')">Media</button>
<button onclick="showPage('about')">About</button>
</nav>
</header>


<main class="pages">

<!-- HOME PAGE -->

<section id="home" class="page active">

<div class="hero-panel">
<img id="home-hero-logo" src="" alt="">
<p class="muted" id="home-hero-intro"></p>
</div>

<div class="content-panel">
<span class="eyebrow" id="home-welcome-eyebrow"></span>
<h1 id="home-welcome-title"></h1>
<p id="home-welcome-text"></p>
</div>

<div class="card-grid" id="home-quick-links"></div>

</section>


<!-- EXHIBIT PAGE -->

<section id="exhibit" class="page">

<div class="hero-panel">
<img id="exhibit-logo" src="" alt="">
</div>

<div class="content-panel">
<h2 id="exhibit-title"></h2>
<p id="exhibit-intro"></p>
<p class="muted" id="exhibit-note"></p>
</div>

<div class="card-grid" id="exhibit-cards"></div>

</section>


<!-- STORY PAGES -->

<section id="page-story-1" class="page story-page">
<div class="story-hero" id="story-1-hero"></div>
<div class="story-content">
<span class="eyebrow" id="story-1-eyebrow"></span>
<h2 id="story-1-title"></h2>
<div id="story-1-tags" class="tag-row"></div>
<div id="story-1-body"></div>
</div>
</section>

<section id="page-story-2" class="page story-page">
<div class="story-hero" id="story-2-hero"></div>
<div class="story-content">
<span class="eyebrow" id="story-2-eyebrow"></span>
<h2 id="story-2-title"></h2>
<div id="story-2-tags" class="tag-row"></div>
<div id="story-2-body"></div>
</div>
</section>

<section id="page-story-3" class="page story-page">
<div class="story-hero" id="story-3-hero"></div>
<div class="story-content">
<span class="eyebrow" id="story-3-eyebrow"></span>
<h2 id="story-3-title"></h2>
<div id="story-3-tags" class="tag-row"></div>
<div id="story-3-body"></div>
</div>
</section>


<!-- GALLERY -->

<section id="gallery" class="page">

<div class="content-panel">
<span class="eyebrow" id="gallery-eyebrow"></span>
<h2 id="gallery-title"></h2>
<p id="gallery-intro"></p>
</div>

<div class="gallery-grid" id="gallery-items"></div>

</section>


<!-- MEDIA -->

<section id="media" class="page">

<div class="content-panel">
<span class="eyebrow" id="media-eyebrow"></span>
<h2 id="media-title"></h2>
<p id="media-intro"></p>
</div>

<div class="media-grid" id="media-items"></div>

<p class="muted center" id="media-footer"></p>

</section>


<!-- ABOUT -->

<section id="about" class="page">

<div class="content-panel">
<span class="eyebrow" id="about-eyebrow"></span>
<h2 id="about-title"></h2>
<div id="about-text"></div>

<div class="about-logo">
<img id="about-logo" src="" alt="">
</div>
</div>

</section>

</main>

</div>



<script>

function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
document.getElementById(id).classList.add('active')
window.scrollTo(0,0)
}



async function loadContent(){

const res = await fetch('content/site.json')
const data = await res.json()


/* SITE */

document.getElementById('site-title').textContent = data.site.title
document.getElementById('site-preview-label').textContent = data.site.previewLabel


/* HOME */

document.getElementById('home-hero-logo').src = data.home.heroLogo
document.getElementById('home-hero-intro').textContent = data.home.heroIntro
document.getElementById('home-welcome-eyebrow').textContent = data.home.welcomeEyebrow
document.getElementById('home-welcome-title').textContent = data.home.welcomeTitle
document.getElementById('home-welcome-text').textContent = data.home.welcomeText


const homeLinks = document.getElementById('home-quick-links')

data.home.quickLinks.forEach(link=>{
homeLinks.innerHTML += `
<div class="card">
<h3>${link.title}</h3>
<p>${link.text}</p>
</div>
`
})


/* EXHIBIT */

document.getElementById('exhibit-logo').src = data.exhibit.logo
document.getElementById('exhibit-title').textContent = data.exhibit.title
document.getElementById('exhibit-intro').textContent = data.exhibit.intro
document.getElementById('exhibit-note').textContent = data.exhibit.note

const exhibitCards = document.getElementById('exhibit-cards')

data.exhibit.cards.forEach(card=>{
exhibitCards.innerHTML += `
<div class="card" onclick="showPage('${card.pageId}')">
<div class="card-image" style="background-image:url('${card.image}')"></div>
<h3>${card.title}</h3>
<p>${card.text}</p>
</div>
`
})


/* STORIES */

data.stories.forEach((story,i)=>{

let index = i+1

document.getElementById(`story-${index}-eyebrow`).textContent = story.eyebrow
document.getElementById(`story-${index}-title`).textContent = story.title

document.getElementById(`story-${index}-hero`)
.style.backgroundImage = `url('${story.heroImage}')`

let tags = document.getElementById(`story-${index}-tags`)

story.tags.forEach(tag=>{
tags.innerHTML += `<span class="tag">${tag}</span>`
})

let body = document.getElementById(`story-${index}-body`)

story.paragraphs.forEach(p=>{
body.innerHTML += `<p>${p}</p>`
})

})


/* GALLERY */

document.getElementById('gallery-eyebrow').textContent = data.gallery.eyebrow
document.getElementById('gallery-title').textContent = data.gallery.title
document.getElementById('gallery-intro').textContent = data.gallery.intro

const gallery = document.getElementById('gallery-items')

data.gallery.items.forEach(item=>{
gallery.innerHTML += `
<div class="gallery-item">
<img src="${item.image}" alt="${item.alt}">
<h4>${item.title}</h4>
<p>${item.description}</p>
</div>
`
})


/* MEDIA */

document.getElementById('media-eyebrow').textContent = data.media.eyebrow
document.getElementById('media-title').textContent = data.media.title
document.getElementById('media-intro').textContent = data.media.intro
document.getElementById('media-footer').textContent = data.media.footerNote

const mediaGrid = document.getElementById('media-items')

data.media.items.forEach(item=>{
mediaGrid.innerHTML += `
<div class="media-card">
<img src="${item.thumb}">
<span class="eyebrow">${item.eyebrow}</span>
<h3>${item.title}</h3>
<p>${item.text}</p>
<button>${item.buttonLabel}</button>
</div>
`
})


/* ABOUT */

document.getElementById('about-eyebrow').textContent = data.about.eyebrow
document.getElementById('about-title').textContent = data.about.title

const aboutText = document.getElementById('about-text')

data.about.paragraphs.forEach(p=>{
aboutText.innerHTML += `<p>${p}</p>`
})

document.getElementById('about-logo').src = data.about.logo
document.getElementById('about-logo').alt = data.about.logoAlt

}

loadContent()

</script>

</body>
</html>
